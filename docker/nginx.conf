server {
    listen 80;
    server_name _;
    root /app/public;

    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # Désactiver absolument toute redirection automatique de Nginx
    absolute_redirect off;
    port_in_redirect  off;
    server_name_in_redirect off;

    gzip on;
    gzip_types application/json application/ld+json text/plain;

    # Capturer /api et /api/ sans redirection — priorité absolue
    location = /api {
        try_files $uri /index.php?$query_string;
    }

    location = /api/ {
        try_files $uri /index.php?$query_string;
    }

    location ^~ /api/bundles/ {
        alias /app/public/bundles/;
    }

    location /api {
        try_files $uri /index.php$is_args$args;
    }

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass unix:/run/php-fpm.sock;

        fastcgi_param SCRIPT_FILENAME  /app/public/index.php;
        fastcgi_param QUERY_STRING     $query_string;
        fastcgi_param REQUEST_METHOD   $request_method;
        fastcgi_param CONTENT_TYPE     $content_type;
        fastcgi_param CONTENT_LENGTH   $content_length;
        fastcgi_param SCRIPT_NAME      /index.php;
        fastcgi_param REQUEST_URI      $request_uri;
        fastcgi_param DOCUMENT_URI     $document_uri;
        fastcgi_param DOCUMENT_ROOT    /app/public;
        fastcgi_param SERVER_PROTOCOL  $server_protocol;
        fastcgi_param REQUEST_SCHEME   $scheme;
        fastcgi_param HTTPS            off;
        fastcgi_param GATEWAY_INTERFACE CGI/1.1;
        fastcgi_param SERVER_SOFTWARE  nginx/$nginx_version;
        fastcgi_param REMOTE_ADDR      $remote_addr;
        fastcgi_param REMOTE_PORT      $remote_port;
        fastcgi_param SERVER_ADDR      $server_addr;
        fastcgi_param SERVER_PORT      $server_port;
        fastcgi_param SERVER_NAME      $server_name;
        fastcgi_param PATH_INFO        $fastcgi_path_info;

        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_read_timeout 120s;

        internal;
    }

    location ~ \.php$ {
        return 404;
    }
}
