services:

  db:
    # image: postgres:16-alpine
    image: zeroj1-docker-stages.repositoi-zac.enedis.fr/postgres:15.15
    container_name: runtracker_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER:-runner}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-runner}
      POSTGRES_DB: ${DATABASE_NAME:-running_tracker_db}
    networks:
      - network1
    volumes:
      - /home/f41374/Projects/running-tracker-db:/var/lib/postgresql/data:rw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-runner} -d ${DATABASE_NAME:-running-tracker}"]
      interval: 5s
      timeout: 5s
      retries: 15

  app:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    #   args:
    #     INSTALL_REMOTE_PROJECT: ${INSTALL_REMOTE_PROJECT:-false}
    #     branch_project_name: ${branch_project_name:-main}
    #     git_project_account: ${git_project_account:-}
    #     git_project_account_secret: ${git_project_account_secret:-}
    #     project_env: ${project_env:-}
    #     git_project_repo_url: ${git_project_repo_url:-https://github.com/Ella-rep/running-tracker.git}
    image: zeroj1-docker-stages.repositoi-zac.enedis.fr/ppi-deploiement-api:1-0-0
    container_name: runtracker_app
    restart: unless-stopped
    working_dir: /appli/apache2/htdocs/symfony
    ports:
      - "${APP_PORT:-8080}:80"
    networks:
      - network1
    environment:
      APP_ENV: ${APP_ENV:-prod}
      APP_SECRET: ${APP_SECRET:-change_me_generate_with_openssl_rand_hex_32}
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: ${DATABASE_USER:-runner}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-runner}
      DATABASE_NAME: ${DATABASE_NAME:-running_tracker_db}
      DATABASE_VERSION: ${DATABASE_VERSION:-16}
      JWT_SECRET_KEY: modifier
      JWT_PUBLIC_KEY: modifier
      JWT_PASSPHRASE: ${JWT_PASSPHRASE:-change_me_jwt_passphrase}
      JWT_TTL: ${JWT_TTL:-604800}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-'^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$'}
      
    volumes:
      - jwt_keys:/appli/apache2/htdocs/symfony/config/jwt
      - /home/f41374/Projects/running-tracker:/appli/apache2/htdocs/symfony:rw
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  jwt_keys:
    driver: local
    
networks:
  network1:
    name: reseau-projet
    external: true
