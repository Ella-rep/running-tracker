services:

  db:
    image: postgres:15-alpine
    container_name: runtracker_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER:-runner}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-runner}
      POSTGRES_DB: ${DATABASE_NAME:-running_tracker_db}
    networks:
      - network1
    volumes:
      - ../running-tracker-db:/var/lib/postgresql/data:rw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-runner} -d ${DATABASE_NAME:-running_tracker_db}"]
      interval: 5s
      timeout: 5s
      retries: 15

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,db}
        INSTALL_REMOTE_PROJECT: ${INSTALL_REMOTE_PROJECT:-false}
        branch_project_name: ${branch_project_name:-main}
        git_project_account: ${git_project_account:-}
        git_project_account_secret: ${git_project_account_secret:-}
        project_env: ${project_env:-}
        git_project_repo_url: ${git_project_repo_url:-https://github.com/Ella-rep/running-tracker.git}
    container_name: runtracker_app
    restart: unless-stopped
    working_dir: /app
    ports:
      - "${APP_PORT:-8080}:80"
    networks:
      - network1
    environment:
      APP_ENV: ${APP_ENV:-prod}
      APP_SECRET: ${APP_SECRET:-change_me_generate_with_openssl_rand_hex_32}
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: ${DATABASE_USER:-runner}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-runner}
      DATABASE_NAME: ${DATABASE_NAME:-running_tracker_db}
      DATABASE_VERSION: ${DATABASE_VERSION:-15}
      DEFAULT_URI: ${DEFAULT_URI:-http://localhost}
      JWT_SECRET_KEY: /app/config/jwt/private.pem
      JWT_PUBLIC_KEY: /app/config/jwt/public.pem
      JWT_PASSPHRASE: ${JWT_PASSPHRASE:-change_me_jwt_passphrase}
      JWT_TTL: ${JWT_TTL:-604800}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-'^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$'}
      
    volumes:
      - jwt_keys:/app/config/jwt
      - ./:/app:rw
      - /app/vendor
      - /app/var
    depends_on:
      db:
        condition: service_healthy

###> doctrine/doctrine-bundle ###
  database:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      # You should definitely change the password in production
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}
      POSTGRES_USER: ${POSTGRES_USER:-app}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-app}", "-U", "${POSTGRES_USER:-app}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_data:/var/lib/postgresql/data:rw
      # You may use a bind-mounted host directory instead, so that it is harder to accidentally remove the volume and lose all your data!
      # - ./docker/db/data:/var/lib/postgresql/data:rw
###< doctrine/doctrine-bundle ###

volumes:
  postgres_data:
    driver: local
  jwt_keys:

###> doctrine/doctrine-bundle ###
  database_data:
###< doctrine/doctrine-bundle ###
    driver: local
    
networks:
  network1:
    name: reseau-projet
    external: true
