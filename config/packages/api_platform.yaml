api_platform:
    title: 'Running Tracker API'
    version: '1.0.0'
    formats:
        json: ['application/json']
        jsonld: ['application/ld+json']
    docs_formats:
        jsonld: ['application/ld+json']
        json: ['application/json']
        html: ['text/html']
    defaults:
        stateless: true
        cache_headers:
            vary: ['Content-Type', 'Authorization']
        pagination_enabled: true
        pagination_items_per_page: 100
    collection:
        pagination:
            enabled: true
    # Filter results to current user automatically
    # (handled via security on each operation)
