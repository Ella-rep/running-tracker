security:
    password_hashers:
        App\Entity\User:
            algorithm: bcrypt
            cost: 12

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: username

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        api_public_auth:
            pattern: ^/api/auth/(login|register|reset-password/request|reset-password/confirm)$
            stateless: true
            security: false

        api:
            pattern: ^/api
            stateless: true
            jwt: ~

        main:
            pattern: ^/
            lazy: true
            security: false

    access_control:
        - { path: ^/api/auth/login,    roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/(login|register|reset-password/request|reset-password/confirm)$, roles: PUBLIC_ACCESS }
        - { path: ^/api/docs,          roles: PUBLIC_ACCESS }
        - { path: ^/api,               roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/,                  roles: PUBLIC_ACCESS }
